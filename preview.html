<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Home Power Flow Card Preview</title>
  <style>
    body{margin:0;padding:28px;background:#080d14;font-family:Inter,ui-sans-serif,system-ui,sans-serif}ha-card{display:block;border-radius:18px}.preview{max-width:1000px;margin:auto}
  </style>
</head>
<body>
  <main class="preview"><home-power-flow-card id="card"></home-power-flow-card></main>
  <script type="module" src="./home-power-flow-card.js"></script>
  <script type="module">
    const entity = (state) => ({ state: String(state), attributes: {} });
    const states = {};
    const put = (id, value) => states[id] = entity(value);
    const cells = (pack, start) => Array.from({length:16},(_,i) => {
      const id = `sensor.b${pack}_cell_${String(i+1).padStart(2,"0")}`;
      put(id, (start + ((i * 7) % 11) / 1000).toFixed(3));
      return id;
    });
    const batteries = [1,2,3].map((n) => {
      const prefix = `sensor.b${n}`;
      put(`${prefix}_soc`, [82,79,84][n-1]); put(`${prefix}_voltage`, [53.2,53.1,53.3][n-1]);
      put(`${prefix}_current`, [12.4,11.8,12.9][n-1]); put(`${prefix}_power`, [660,627,688][n-1]);
      put(`${prefix}_temp1`, [27.2,28.1,27.7][n-1]); put(`${prefix}_temp2`, [26.8,27.5,27.2][n-1]);
      put(`${prefix}_delta`, [0.014,0.019,0.016][n-1]); put(`${prefix}_cycles`, 347+n*4);
      return {name:`Battery Pack ${n}`,soc:`${prefix}_soc`,voltage:`${prefix}_voltage`,current:`${prefix}_current`,power:`${prefix}_power`,temperature_1:`${prefix}_temp1`,temperature_2:`${prefix}_temp2`,cell_delta:`${prefix}_delta`,cycles:`${prefix}_cycles`,cells:cells(n,3.326+n*.002)};
    });
    const values = {
      "sensor.og_pv1_p":1860,"sensor.og_pv1_v":218.4,"sensor.og_pv1_a":8.5,"sensor.og_pv2_p":1420,"sensor.og_pv2_v":205.8,"sensor.og_pv2_a":6.9,"sensor.og_pv3_p":740,"sensor.og_pv3_v":211.4,"sensor.og_pv3_a":3.5,"sensor.og_pv4_p":510,"sensor.og_pv4_v":203.1,"sensor.og_pv4_a":2.5,
      "sensor.gt_pv1_p":1210,"sensor.gt_pv1_v":312.2,"sensor.gt_pv1_a":3.9,"sensor.gt_pv2_p":980,"sensor.gt_pv2_v":307.7,"sensor.gt_pv2_a":3.2,"sensor.gt_pv3_p":620,"sensor.gt_pv3_v":305.4,"sensor.gt_pv3_a":2.0,"sensor.gt_pv4_p":430,"sensor.gt_pv4_v":301.8,"sensor.gt_pv4_a":1.4,
      "sensor.og_out_p":2840,"sensor.og_out_v":239.7,"sensor.og_out_a":11.8,"sensor.og_hz":50.0,"sensor.og_load":42,"sensor.og_temp":38.2,"sensor.og_bus":54.1,"sensor.og_status":"Running",
      "sensor.gt_out_p":2130,"sensor.gt_out_v":240.1,"sensor.gt_out_a":8.9,"sensor.gt_hz":50.0,"sensor.gt_load":31,"sensor.gt_temp":41.4,"sensor.gt_bus":370.3,"sensor.gt_status":"Producing",
      "sensor.house":4210,"sensor.shed":1440,"sensor.pool":620,"sensor.grid_primary":-760,"sensor.offgrid_from_box":710,"sensor.bank":1975,"sensor.bank_soc":82,"sensor.bank_current":37.1,"sensor.grid_v":240.2,"sensor.grid_a":3.2,"sensor.grid_hz":50,"sensor.grid_in":4.8,"sensor.grid_out":9.2
    };
    Object.entries(values).forEach(([id,value]) => put(id,value));
    const card = document.querySelector("#card");
    const [requestedAdditionalCount, requestedPhantomThreshold, requestedPowerBoxPhantomThreshold] = location.hash ? location.hash.slice(1).split(",") : [new URLSearchParams(location.search).get("additionals"), null, null];
    const additionalCount = Math.max(0, Math.min(2, Number(requestedAdditionalCount ?? 2)));
    const phantomPowerThreshold = Math.max(0, Number(requestedPhantomThreshold ?? 20));
    const powerBoxPhantomThreshold = Math.max(0, Number(requestedPowerBoxPhantomThreshold ?? 20));
    await customElements.whenDefined("home-power-flow-card");
    card.setConfig({
      title:"Home Energy System",battery_total_power:"sensor.bank",battery_bank:{name:"3 Battery Packs",soc:"sensor.bank_soc",current:"sensor.bank_current"},house:{name:"House and Additional",power:"sensor.house",additional_1_name:additionalCount>=1?"Shed":"",additional_1_power:"sensor.shed",additional_1_icon:"mdi:garage",additional_2_name:additionalCount>=2?"Pool":"",additional_2_power:"sensor.pool",additional_2_icon:"mdi:pool"},power_box:{name:"Distribution Board",icon:"mdi:electric-switchboard",grid_name:"Utility Grid",grid_icon:"mdi:transmission-tower",calculate_current:true,phantom_power_threshold:phantomPowerThreshold,offgrid_phantom_power_threshold:powerBoxPhantomThreshold,power:"sensor.grid_primary",offgrid_power:"sensor.offgrid_from_box",voltage:"sensor.grid_v",current:"sensor.grid_a",frequency:"sensor.grid_hz",daily_import:"sensor.grid_in",daily_export:"sensor.grid_out"},
      offgrid:{name:"Shed Inverter",icon:"mdi:home-lightning-bolt-outline",output_power:"sensor.og_out_p",output_voltage:"sensor.og_out_v",output_current:"sensor.og_out_a",frequency:"sensor.og_hz",load_percent:"sensor.og_load",temperature:"sensor.og_temp",bus_voltage:"sensor.og_bus",grid_input_power:"sensor.offgrid_from_box",status:"sensor.og_status",arrays:[{name:"North Shed",power:"sensor.og_pv1_p",voltage:"sensor.og_pv1_v",current:"sensor.og_pv1_a"},{name:"West Shed",power:"sensor.og_pv2_p",voltage:"sensor.og_pv2_v",current:"sensor.og_pv2_a"},{name:"East Shed",power:"sensor.og_pv3_p",voltage:"sensor.og_pv3_v",current:"sensor.og_pv3_a"},{name:"Awning",power:"sensor.og_pv4_p",voltage:"sensor.og_pv4_v",current:"sensor.og_pv4_a"}]},
      grid_tie:{name:"House Solar Inverter",icon:"mdi:solar-power-variant",output_power:"sensor.gt_out_p",output_voltage:"sensor.gt_out_v",output_current:"sensor.gt_out_a",frequency:"sensor.gt_hz",load_percent:"sensor.gt_load",temperature:"sensor.gt_temp",bus_voltage:"sensor.gt_bus",status:"sensor.gt_status",arrays:[{name:"North Roof",power:"sensor.gt_pv1_p",voltage:"sensor.gt_pv1_v",current:"sensor.gt_pv1_a"},{name:"West Roof",power:"sensor.gt_pv2_p",voltage:"sensor.gt_pv2_v",current:"sensor.gt_pv2_a"},{name:"East Roof",power:"sensor.gt_pv3_p",voltage:"sensor.gt_pv3_v",current:"sensor.gt_pv3_a"},{name:"Garage Roof",power:"sensor.gt_pv4_p",voltage:"sensor.gt_pv4_v",current:"sensor.gt_pv4_a"}]},
      batteries
    });
    card.hass = { states };
  </script>
</body>
</html>
