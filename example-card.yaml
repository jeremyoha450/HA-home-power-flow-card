type: custom:home-power-flow-card
title: Home Energy System
precision: 1
cell_warning_delta: 0.03
show_zero_flows: false
show_overview: false
details_open: false

# Combined battery-bank readings. If battery_total_power is omitted, the card
# adds the three pack power sensors.
battery_bank:
  name: Combined Battery Bank
  soc: sensor.total_battery_soc
  voltage: sensor.total_battery_voltage
  current: sensor.total_battery_current
  capacity: sensor.total_battery_capacity
  charging_daily: sensor.total_battery_charging_power_kwh_daily
  discharging_daily: sensor.total_battery_discharging_power_kwh_daily

house:
  name: House and Additional Loads
  power: sensor.to_house_power
  # Leave either name blank to hide that node and automatically adjust the layout.
  additional_1_name: Shed
  additional_1_power: sensor.shed_em_powerpoints_power
  additional_1_icon: mdi:garage
  additional_2_name: ""
  additional_2_power:
  additional_2_icon: mdi:pool

power_box:
  name: Main Power Box
  icon: mdi:electric-switchboard
  grid_name: Grid
  grid_icon: mdi:transmission-tower
  calculate_current: true
  phantom_power_threshold: 20
  # Positive imports from Grid; negative exports to Grid.
  power: sensor.powerbox_grid_power
  # This is the value displayed below Power Box as "To inverter".
  offgrid_power: sensor.to_shed_power
  voltage: sensor.powerbox_grid_voltage
  energy: sensor.powerbox_grid_energy
  daily_import: sensor.grid_power_import_kwh_daily
  daily_export: sensor.grid_power_export_kwh_daily

grid_tie:
  name: Grid-tie Inverter
  icon: mdi:solar-power-variant
  output_power: sensor.inverter_on_grid_l1_power
  output_voltage: sensor.inverter_on_grid_l1_voltage
  output_current: sensor.inverter_on_grid_l1_current
  frequency: sensor.inverter_on_grid_l1_frequency
  arrays:
    - name: Grid-tie PV 1
      power: sensor.inverter_pv1_power
      voltage: sensor.inverter_pv1_voltage
      current: sensor.inverter_pv1_current
    - name: Grid-tie PV 2
      power: sensor.inverter_pv2_power
      voltage: sensor.inverter_pv2_voltage
      current: sensor.inverter_pv2_current

offgrid:
  name: MPP Solar Off-grid Inverter
  icon: mdi:home-lightning-bolt-outline
  output_power: sensor.mppsolar_inverter_output_watts_power
  output_voltage: sensor.mppsolar_inverter_output_voltage
  output_current: sensor.mppsolar_output_current
  frequency: sensor.mppsolar_inverter_output_frequency
  solar_power: sensor.mppsolar_inverter_total_pv_power
  solar_daily: sensor.mppsolar_pv_solar_kwh_daily
  solar_daily_alt: sensor.inverter_today_s_pv_generation
  solar_total: sensor.inverter_total_pv_generation
  output_daily: sensor.mppsolar_output_kwh_daily
  status: sensor.mppsolar_inverter_status
  mode: sensor.mppsolar_inverter_mode
  arrays:
    - name: Off-grid PV 1
      power: sensor.mppsolar_inverter_pv1_charging_powe
      voltage: sensor.mppsolar_inverter_pv1_voltage
      current: sensor.mppsolar_inverter_pv1_current
    - name: Off-grid PV 2
      power: sensor.mppsolar_inverter_pv2_charging_power
      voltage: sensor.mppsolar_inverter_pv2_voltage
      current: sensor.mppsolar_inverter_pv2_current

batteries:
  - name: Battery Pack 1
    soc: sensor.jkbms_soc
    voltage: sensor.jkbms_voltage
    current: sensor.jkbms_current
    power: sensor.jkbms_power
    cell_average: sensor.jkbms_avg_cell_volt
    cell_max: sensor.jkbms_max_cell_volt
    cell_min: sensor.jkbms_min_cell_volt
    temperature_1: sensor.jkbms_bat_temp_1
    temperature_2: sensor.jkbms_bat_temp_2
    temperature_3: sensor.jkbms_bat_temp_3
    temperature_4: sensor.jkbms_bat_temp_4
    capacity: sensor.jkbms_battery_capacity
    charging_power: sensor.jkbms_charging_power
    discharging_power: sensor.jkbms_discharging_power
    # cells: [sensor.pack_1_cell_1, ... sensor.pack_1_cell_16]

  - name: Battery Pack 2
    soc: sensor.jkbms_bat_2_jkbms_soc
    voltage: sensor.jkbms_bat_2_jkbms_voltage
    current: sensor.jkbms_bat_2_jkbms_current
    power: sensor.jkbms_bat_2_jkbms_power
    cell_average: sensor.jkbms_bat_2_jkbms_avg_cell_volt
    cell_max: sensor.jkbms_bat_2_jkbms_max_cell_volt
    cell_min: sensor.jkbms_bat_2_jkbms_min_cell_volt
    temperature_1: sensor.jkbms_bat_2_jkbms_bat_temp_1
    temperature_2: sensor.jkbms_bat_2_jkbms_bat_temp_2
    temperature_3: sensor.jkbms_bat_2_jkbms_bat_temp_3
    temperature_4: sensor.jkbms_bat_2_jkbms_bat_temp_4
    capacity: sensor.jkbms_bat_2_jkbms_battery_capacity
    charging_power: sensor.jkbms_bat_2_jkbms_charging_power
    discharging_power: sensor.jkbms_bat_2_jkbms_discharging_power
    # cells: [sensor.pack_2_cell_1, ... sensor.pack_2_cell_16]

  - name: Battery Pack 3
    soc: sensor.jkbms_bat_3_jkbms_soc
    voltage: sensor.jkbms_bat_3_jkbms_voltage
    current: sensor.jkbms_bat_3_jkbms_current
    power: sensor.jkbms_bat_3_jkbms_power
    cell_average: sensor.jkbms_bat_3_jkbms_avg_cell_volt
    cell_max: sensor.jkbms_bat_3_jkbms_max_cell_volt
    cell_min: sensor.jkbms_bat_3_jkbms_min_cell_volt
    temperature_1: sensor.jkbms_bat_3_jkbms_bat_temp_1
    temperature_2: sensor.jkbms_bat_3_jkbms_bat_temp_2
    temperature_3: sensor.jkbms_bat_3_jkbms_bat_temp_3
    temperature_4: sensor.jkbms_bat_3_jkbms_bat_temp_4
    capacity: sensor.jkbms_bat_3_jkbms_battery_capacity
    charging_power: sensor.jkbms_bat_3_jkbms_charging_power
    discharging_power: sensor.jkbms_bat_3_jkbms_discharging_power
    # cells: [sensor.pack_3_cell_1, ... sensor.pack_3_cell_16]
